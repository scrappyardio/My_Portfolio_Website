<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px 0 64px;
    gap: 20px;
  }

  /* ── Page picker ── */
  .tabs {
    display: flex;
    gap: 8px;
    background: #2a2a2a;
    padding: 6px;
    border-radius: 12px;
  }
  .tab {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: #888;
    font-size: 14px;
    cursor: pointer;
    transition: all 150ms;
  }
  .tab:hover { color: #fff; }
  .tab.active { background: #fff; color: #111; font-weight: 600; }

  /* ── Phone frame ── */
  .phone-wrap {
    position: relative;
    width: 425px;
    background: #111;
    border-radius: 50px;
    padding: 16px;
    box-shadow: 0 0 0 2px #333, 0 30px 80px rgba(0,0,0,0.6);
  }
  .phone-screen {
    border-radius: 36px;
    overflow: hidden;
    background: #fff;
    position: relative;
  }
  iframe {
    display: block;
    width: 393px;
    height: 852px;
    border: none;
    background: #fff;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .hint {
    color: #555;
    font-size: 13px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #2a2a2a;
    color: #ccc;
    font-size: 13px;
    cursor: pointer;
    transition: all 150ms;
  }
  .btn:hover { background: #333; color: #fff; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="load('index.html', this)">index</button>
  <button class="tab" onclick="load('leo.html', this)">leo</button>
  <button class="tab" onclick="load('humphrey.html', this)">humphrey</button>
  <button class="tab" onclick="load('jeff.html', this)">jeff</button>
</div>

<div class="controls">
  <span class="hint">Отредактировал файл? →</span>
  <button class="btn" onclick="document.getElementById('frame').contentWindow.location.reload()">Обновить ↺</button>
</div>

<div class="phone-wrap">
  <div class="phone-screen">
    <iframe id="frame" src="index.html"></iframe>
  </div>
</div>

<script>
  function load(page, btn) {
    document.getElementById('frame').src = page + '?t=' + Date.now();
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }
</script>

</body>
</html>
